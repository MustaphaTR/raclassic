^Explosion:
	ValidTargets: Ground, Water, Air, GroundActor, WaterActor, AirborneActor
	Warhead@1Dam: SpreadDamage
		Spread: 426
		Damage: 50
		ValidTargets: GroundActor, WaterActor
		Versus:
			None: 90
			Wood: 75
			Light: 60
			Heavy: 25
			Concrete: 100
		DamageTypes: Prone50Percent, TriggerProne, ExplosionDeath
	Warhead@Smu: LeaveSmudge
		SmudgeType: Crater
		ValidTargets: Ground, Vehicle, Infantry
	Warhead@2Eff: CreateEffect
		Explosions: self_destruct
		ImpactSounds: kaboom22.aud
		ValidTargets: Ground, Air, GroundActor, AirborneActor, WaterActor, Trees
	Warhead@3EffWater: CreateEffect
		Explosions: large_splash
		ImpactSounds: splash9.aud
		ValidTargets: Water, Underwater
		InvalidTargets: Bridge

CrateNapalm:
	Inherits: ^Explosion
	ValidTargets: Ground, GroundActor, WaterActor, Trees
	Warhead@1Dam: SpreadDamage
		Spread: 170
		Damage: 60
		Falloff: 1000, 368, 135, 50, 18, 7, 0
		ValidTargets: GroundActor, WaterActor, Trees
		Versus:
			Wood: 100
			Concrete: 50
		AffectsParent: true
		DamageTypes: Prone50Percent, TriggerProne, FireDeath, Incendiary
	Warhead@2Eff: CreateEffect
		Explosions: napalm
		ImpactSounds: firebl3.aud
		ValidTargets: Ground, Water, Air, GroundActor, AirborneActor, WaterActor, Trees
	-Warhead@3EffWater:
	Warhead@Smu: LeaveSmudge
		SmudgeType: Scorch

CrateExplosion:
	Inherits: ^Explosion
	Warhead@1Dam: SpreadDamage
		Falloff: 1000, 368, 135, 50, 18, 7, 0
		AffectsParent: true
	Warhead@2Eff: CreateEffect
		ValidTargets: Ground, Water, Air, GroundActor, AirborneActor, WaterActor, Trees
	-Warhead@3EffWater:

UnitExplode:
	Inherits: ^Explosion
	Warhead@1Dam: SpreadDamage
		Falloff: 1000, 368, 135, 50, 18, 7, 0

UnitExplodeAir:
	Inherits: ^Explosion
	-Warhead@Smu:
	Warhead@2Eff: CreateEffect
		Explosions: building
		ImpactSounds: kaboom25.aud

VisualExplode:
	Inherits: ^Explosion
	-Warhead@1Dam:
	Warhead@2Eff: CreateEffect
		Explosions: offset_napalm
		ImpactSounds: firebl3.aud

UnitExplodeShip:
	Inherits: ^Explosion
	-Warhead@Smu:
	Warhead@2Eff: CreateEffect
		Explosions: building
		ImpactSounds: kaboom25.aud
		ValidTargets: Ground, Water
		ImpactActors: false
	Warhead@3EffWater: CreateEffect
		ValidTargets: Water
		ImpactActors: false

UnitExplodeSubmarine:
	Inherits: ^Explosion
	-Warhead@Smu:
	Warhead@2Eff: CreateEffect
		Explosions: large_splash
		ImpactSounds: splash9.aud
		ValidTargets: Water
		ImpactActors: false
	-Warhead@3EffWater:

UnitExplodeSmall:
	Inherits: ^Explosion
	Warhead@1Dam: SpreadDamage
		Damage: 40
	Warhead@2Eff: CreateEffect
		Explosions: large_explosion
		ImpactSounds: kaboom15.aud

ArtilleryExplode:
	Inherits: ^Explosion
	Warhead@1Dam: SpreadDamage
		Damage: 150
	Warhead@2Eff: CreateEffect
		Explosions: self_destruct
		ImpactSounds: kaboom22.aud

V2Explode:
	Inherits: SCUD
	-Report:
	Warhead@3Eff: CreateEffect
		Explosions: large_napalm
		ImpactSounds: firebl3.aud

BuildingExplode:
	ValidTargets: Ground, Water, GroundActor, WaterActor
	Warhead@2Eff: CreateEffect
		Explosions: building
	Warhead@Smu: LeaveSmudge
		SmudgeType: Crater
		ValidTargets: GroundActor
		InvalidTargets: Wall

CivBuildingExplosion:
	ValidTargets: Ground, GroundActor
	Warhead@1Dam: SpreadDamage # Used to panic civilians which are emitted from a killed CivBuilding
		ValidTargets: Infantry
		Falloff: 100, 100
		Range: 0, 128
		Damage: 1
		Delay: 1

BarrelExplode:
	Inherits: ^Explosion
	Warhead@1Dam: SpreadDamage
		Falloff: 1000, 368, 135, 50, 18, 7, 0
		Delay: 5
		ValidTargets: Ground, Trees
		Versus:
			None: 120
			Wood: 200
			Light: 50
			Concrete: 10
		DamageTypes: Prone50Percent, TriggerProne, ExplosionDeath, Incendiary
	Warhead@2Eff: CreateEffect
		Explosions: napalm
		ImpactSounds: firebl3.aud
		Delay: 5
	-Warhead@3EffWater:
	Warhead@Smu: LeaveSmudge
		SmudgeType: Scorch
		Size: 2
		Delay: 5

BridgeExplode:
	Inherits: VisualExplode
	Warhead@2Eff: CreateEffect
		Explosions: large_napalm
		ValidTargets: Bridge, Ground, Water

AVMine:
	ValidTargets: Ground, Water, GroundActor, WaterActor
	Warhead@1Dam: SpreadDamage
		Spread: 256
		Damage: 1200
		AffectsParent: true
		ValidTargets: GroundActor, WaterActor
		InvalidTargets: Mine
		DamageTypes: Prone50Percent, TriggerProne, SmallExplosionDeath
	Warhead@2Eff: CreateEffect
		Explosions: building
		ImpactSounds: mine1.aud
		InvalidTargets: Vehicle
	Warhead@3Eff: CreateEffect
		Explosions: artillery_explosion
		ImpactSounds: mineblo1.aud
		ValidTargets: Vehicle
	Warhead@Smu: LeaveSmudge
		SmudgeType: Crater
		ValidTargets: Ground, GroundActor
		InvalidTargets: Structure, Wall

APMine:
	Inherits: AVMine
	Warhead@1Dam: SpreadDamage
		Damage: 1000
		Versus:
			Light: 1
			Heavy: 1
	Warhead@3Eff: CreateEffect
		Explosions: small_explosion

CrateNuke:
	ValidTargets: Ground, GroundActor, Trees, Water, WaterActor, Underwater, Air, AirborneActor
	Warhead@1Dam_impact: SpreadDamage
		Spread: 2c512
		Damage: 1000
		Falloff: 100, 100, 0
		ValidTargets: GroundActor, Trees, WaterActor, AirborneActor
		Versus:
			None: 90
			Light: 60
			Heavy: 25
			Concrete: 50
		AffectsParent: true
		DamageTypes: Prone50Percent, TriggerProne, FireDeath, Incendiary
	Warhead@2Res_impact: DestroyResource
	Warhead@3Eff_impact: CreateEffect
		Explosions: nuke
		ImpactSounds: kaboom1.aud
		ImpactActors: false
	Warhead@6Eff_areanuke1: CreateEffect
		ImpactSounds: kaboom22.aud
		ImpactActors: false
	Warhead@6Smu_areanuke1: LeaveSmudge
		SmudgeType: Scorch
		ValidTargets: Ground, Infantry
		Size: 4
	Warhead@TREEKILL: SpreadDamage
		Spread: 2c512
		Damage: 1000
		Falloff: 100, 100, 0
		ValidTargets: Trees
		DamageTypes: Incendiary

MiniNuke:
	Inherits: Atomic
